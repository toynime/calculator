<!DOCTYPE html>
<html lang="en">
<head>
   <style>
#back{
    border: 3px solid;
    display: grid;
    grid-template-columns: 60px 60px 60px 60px;
    grid-template-rows:  60px 60px 60px 60px 60px 60px;
    width: 260px;
    gap:5px;
    justify-content: space-around;
    background-color: black;
}
#back div{
    cursor: pointer;
    border: 2px solid white;
    text-align: center;
    line-height: 30px;
    font-size: 25px;
    background-color: orange;
    color: white;
}
#show{
       grid-column: 1/5;
       grid-row: 1/2;
       border: 2px solid;
    position:relative:
}
.plus{
    grid-column: 4/5;
    grid-row: 3/5;
}
.egale{
    grid-row: 5/7;
    grid-column: 4/5;
}
.zero{
    grid-row: 6/7;
    grid-column: 1/3;
}
#span{
        color: black;
        position:absolute;
        top:7px;
        font-size:15px;
        opacity: 0.5;
        left: 560px;
}
img{
    cursor: pointer;
    width: 50px;
    height: 50px;
    float:right;
    margin-top: -400px;
    transition: all 1s;
}
img:hover{
    opacity:0.5;
}
body{
    transition:all 0.5s;
}

   </style>
</head>
<body>
<div id="back" style="margin: auto;">
   <input type="text" id="show">
   <div onclick="supp()">C<span id="span"></span></div>
    <div onclick="operation(2)">/</div>
    <div onclick="operation(3)">*</div>
    <div onclick="operation(4)">-</div>

    <div onclick="addnumber(5)">7</div>
    <div onclick="addnumber(6)">8</div>
    <div onclick="addnumber(7)">9</div>
    <div onclick="operation(8)" class="plus">+</div>

    <div onclick="addnumber(9)">4</div>
    <div onclick="addnumber(10)">5</div>
    <div onclick="addnumber(11)">6</div>

    <div onclick="addnumber(12)">1</div>
    <div onclick="addnumber(13)">2</div>
    <div onclick="addnumber(14)">3</div>

    <div onclick="calculate()" class="egale">=</div>
    <div onclick="addnumber(16)" class="zero">0</div>
    <div onclick="addnumber(17)">.</div>
</div>
<img src="https://img.freepik.com/premium-vector/moon-stars-icon-yellow-isolated-black-flat-vector-illustration-half-moon-with-stars_615232-319.jpg">
<script>
const buttons = document.getElementById("back").children;
const input = document.getElementById("show");
const holder = document.getElementById("span");

let current = "";
let numbers = [];
let operators = [];
let justCalculated = false;

input.value = "";

function addnumber(i) {

    const value = buttons[i].innerHTML;

    if (justCalculated) {
        current = "";
        numbers = [];
        operators = [];
        holder.innerHTML = "";
        input.value = "";
        justCalculated = false;
    }

    if (value === "." && current.includes(".")) return;

    current += value;
    input.value = current;
    holder.innerHTML += value;
}

function operation(i) {

    if (current === "") return;

    numbers.push(Number(current));
    operators.push(buttons[i].innerHTML);

    holder.innerHTML += buttons[i].innerHTML;

    current = "";
    input.value = "";

    justCalculated = false;
}

function supp() {

    if (current !== "") {

        current = current.slice(0, -1);
        input.value = current;
        holder.innerHTML = holder.innerHTML.slice(0, -1);

        return;
    }

    if (operators.length > 0) {

        operators.pop();
        holder.innerHTML = holder.innerHTML.slice(0, -1);

        current = numbers.pop().toString();
        input.value = current;
    }
}

function calculate() {

    if (current === "") return;

    numbers.push(Number(current));

    let nums = [...numbers];
    let ops = [...operators];

    
    for (let i = 0; i < ops.length; i++) {

        if (ops[i] === "*") {

            nums[i] *= nums[i + 1];
            nums.splice(i + 1, 1);
            ops.splice(i, 1);
            i--;
        }

        else if (ops[i] === "/") {

            if (nums[i + 1] === 0) {
                input.value = "Error";
                current = "";
                numbers = [];
                operators = [];
                holder.innerHTML = "";
                return;
            }

            nums[i] /= nums[i + 1];
            nums.splice(i + 1, 1);
            ops.splice(i, 1);
            i--;
        }
    }

    let result = nums[0];

    for (let i = 0; i < ops.length; i++) {

        if (ops[i] === "+")
            result += nums[i + 1];

        else if (ops[i] === "-")
            result -= nums[i + 1];
    }

    input.value = result;
    holder.innerHTML = result;

    current = result.toString();
    numbers = [];
    operators = [];
    justCalculated = true;
}
let ns=document.querySelector("img");
ns.addEventListener("click",function(){
    if(document.body.style.backgroundColor!="black"){
    ns.src="https://www.sunisthefuture.net/wp-content/uploads/2015/02/Sun-Symbol.png";
    document.body.style.backgroundColor="black";
    document.getElementById("back").style.border="3px solid white";
    }
    else{
        ns.src="https://img.freepik.com/premium-vector/moon-stars-icon-yellow-isolated-black-flat-vector-illustration-half-moon-with-stars_615232-319.jpg";
        document.body.style.backgroundColor="white";
        document.getElementById("back").style.border="3px solid";
    }
}
)
</script>

</body>
</html>
